<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Room Planner — Watermark</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/tokens.css">
<link rel="stylesheet" href="css/shell.css">
<link rel="stylesheet" href="css/rooms.css">
</head>
<body>

<!-- ══ Header ══ -->
<div class="hdr">
  <div class="brand" id="brand-btn" onclick="toggleDrop(this)">
    <div class="brand-w"><span>W</span></div>
    <h1>Room Planner</h1>
    <span class="app-chevron">▾</span>
    <div class="app-drop">
      <a class="app-drop-item" href="index.html"><span class="app-drop-icon">📅</span> Calendar</a>
      <a class="app-drop-item" href="admin.html"><span class="app-drop-icon">⚙️</span> Ministry Admin</a>
      <a class="app-drop-item" href="budget.html"><span class="app-drop-icon">💰</span> Budget Planner</a>
      <a class="app-drop-item current" href="rooms.html"><span class="app-drop-icon">🏢</span> Room Planner<span class="app-drop-check">✓</span></a>
    </div>
  </div>
  <div class="hdr-divider"></div>
  <span class="hdr-title" id="hdr-date-lbl"></span>
  <button id="dash-btn" class="hdr-dash-btn" onclick="toggleDashboard()" title="Toggle dashboard">📊 Dashboard</button>
  <button id="theme-toggle" class="theme-btn" onclick="toggleTheme()" title="Toggle dark mode">🌙</button>
</div>

<!-- ══ Controls bar ══ -->
<div class="ctrl-bar">
  <div class="day-nav">
    <button class="nav-btn" onclick="dayNav(-1)" title="Previous day">‹</button>
    <input type="date" class="date-input" id="date-pick" onchange="setDate(this.value)">
    <button class="nav-btn" onclick="dayNav(1)" title="Next day">›</button>
    <button class="today-btn" onclick="goToday()">Today</button>
  </div>
  <div class="ctrl-sep"></div>
  <div class="bldg-tabs" id="bldg-tabs">
    <button class="bldg-tab active" data-bldg="" onclick="setBldg(this,'')">All</button>
    <button class="bldg-tab" data-bldg="East Tower" onclick="setBldg(this,'East Tower')">East Tower</button>
    <button class="bldg-tab" data-bldg="West Tower" onclick="setBldg(this,'West Tower')">West Tower</button>
    <button class="bldg-tab" data-bldg="Kids Building" onclick="setBldg(this,'Kids Building')">Kids Building</button>
    <button class="bldg-tab" data-bldg="Town Center" onclick="setBldg(this,'Town Center')">Town Center</button>
  </div>
  <div class="ctrl-right">
    <button class="icon-btn" onclick="openRoomsModal()">⚙ Edit Rooms</button>
    <button class="icon-btn pri" onclick="openAddPanel()">＋ Add Reservation</button>
  </div>
</div>

<!-- ══ Pending requests banner ══ -->
<div id="pending-rooms-banner" style="display:none"></div>

<!-- ══ Planner shell ══ -->
<div class="planner-shell">
  <div class="gantt-outer" id="gantt-outer">
    <!-- built by buildGantt() -->
  </div>
  <div class="dashboard-view hidden" id="dashboard-view">
    <!-- built by buildDashboard() -->
  </div>
  <div class="legend-bar" id="legend-bar"></div>
</div>

<!-- ══ Block popup ══ -->
<div class="block-popup hidden" id="block-popup">
  <button class="popup-close" onclick="closePopup()">✕</button>
  <div class="popup-title" id="pp-title"></div>
  <div><span class="popup-badge" id="pp-badge"></span></div>
  <div class="popup-time" id="pp-time"></div>
  <div class="popup-room" id="pp-room"></div>
  <div id="pp-link-wrap"></div>
</div>

<!-- ══ Add/Edit Reservation Panel ══ -->
<div class="rsv-overlay" id="rsv-overlay" onclick="closeAddPanel()"></div>
<div class="rsv-panel" id="rsv-panel">
  <div class="rsv-panel-hdr">
    <span class="rsv-panel-title">Add Reservation</span>
    <button class="rsv-panel-close" onclick="closeAddPanel()">✕</button>
  </div>
  <div class="rsv-panel-body">
    <label class="form-lbl">Room</label>
    <select class="form-sel" id="rsv-room"></select>

    <label class="form-lbl">Link to Calendar Event (optional)</label>
    <div class="ev-search-wrap">
      <input class="form-inp" id="rsv-ev-search" type="text"
        placeholder="Search event name…" autocomplete="off"
        oninput="filterEvSearch(this.value)"
        onfocus="filterEvSearch(this.value)"
        onblur="setTimeout(closeEvDropdown,150)">
      <div class="ev-dropdown" id="rsv-ev-dropdown"></div>
    </div>
    <input type="hidden" id="rsv-ev-link">

    <label class="form-lbl">Event Name</label>
    <input class="form-inp" id="rsv-subject" type="text" placeholder="e.g. Sunday Morning Service">

    <label class="form-lbl">Ministry</label>
    <select class="form-sel" id="rsv-ministry">
      <option value="">— select —</option>
      <option>Sunday Services</option>
      <option>Kids Team</option>
      <option>Equipping Team</option>
      <option>Care Team</option>
      <option>Special Events</option>
      <option>Leadership Team</option>
      <option>Missions & Outreach</option>
      <option>Students &amp; College</option>
      <option>Operations Team</option>
      <option>Marriage Team</option>
      <option>Young Adults</option>
      <option>Community &amp; Connecting</option>
      <option>Ministry Programs</option>
      <option>Institute Team</option>
      <option>Watermark en Espanol</option>
      <option>Health &amp; CDC</option>
      <option>Family Team</option>
    </select>

    <label class="form-lbl">Date</label>
    <input class="form-inp" id="rsv-date" type="date">

    <div class="form-row">
      <div>
        <label class="form-lbl">Start Time</label>
        <input class="form-inp" id="rsv-start" type="time" value="09:00">
      </div>
      <div>
        <label class="form-lbl">End Time</label>
        <input class="form-inp" id="rsv-end" type="time" value="11:00">
      </div>
    </div>
  </div>
  <div class="rsv-panel-foot">
    <button class="btn sec" onclick="closeAddPanel()">Cancel</button>
    <button class="btn pri" onclick="saveReservation()">Save Reservation</button>
  </div>
</div>

<!-- ══ Edit Rooms Modal ══ -->
<div class="modal-overlay hidden" id="rooms-modal">
  <div class="modal">
    <div class="modal-hdr">
      <span class="modal-title">⚙ Edit Rooms</span>
      <button class="modal-close" onclick="closeRoomsModal()">✕</button>
    </div>
    <div class="modal-body" id="rooms-modal-body"></div>
    <div class="modal-foot">
      <button class="btn sec" onclick="resetRooms()" style="flex:none;padding:8px 14px;font-size:.72rem;">↺ Reset to Default</button>
      <button class="btn sec" onclick="closeRoomsModal()" style="flex:none;">Close</button>
    </div>
  </div>
</div>

<script src="js/shell.js?v=2"></script>
<script src="js/room-seed.js?v=1"></script>
<script src="js/rooms.js?v=2"></script>
</body>
</html>
