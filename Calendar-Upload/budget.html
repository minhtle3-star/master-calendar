<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Budget Planner — Watermark</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=Lato:ital,wght@0,300;0,400;0,700;0,900;1,400&display=swap">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link rel="stylesheet" href="css/tokens.css">
<link rel="stylesheet" href="css/shell.css">
<link rel="stylesheet" href="css/budget.css">
</head>
<body>
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>
<script src="js/nav.js?v=4"></script>
<script src="js/roles.js?v=2"></script>
<div class="header">
  <div class="brand" id="brand-btn" onclick="toggleDrop(this)">
    <div class="brand-w"><span>W</span></div>
    <h1>Budget Planner</h1>
    <span class="app-chevron">▾</span>
    <div class="app-drop">
      <a class="app-drop-item" href="index.html"><span class="app-drop-icon">📅</span> Calendar</a>
      <a class="app-drop-item" href="admin.html"><span class="app-drop-icon">⚙️</span> Ministry Admin</a>
      <a class="app-drop-item current" href="budget.html"><span class="app-drop-icon">💰</span> Budget Planner<span class="app-drop-check">✓</span></a>
      <a class="app-drop-item" href="rooms.html"><span class="app-drop-icon">🏢</span> Room Planner</a>
      <a class="app-drop-item" href="event-request.html"><span class="app-drop-icon">📋</span> Event Request</a>
    </div>
  </div>
  <div class="hdr-sp"></div>
  <div class="hdr-chip" id="hdr-total">$0</div>
  <button id="theme-toggle" class="theme-btn" onclick="toggleTheme()" title="Toggle dark mode">🌙</button>
</div>

<div class="budget-main">
<div class="budget-tabs">
  <button class="budget-tab active" data-tab="estimate" onclick="setTab('estimate')">📋 Estimate</button>
  <button class="budget-tab" data-tab="actuals" onclick="setTab('actuals')">🧾 Actuals</button>
  <button class="budget-tab" data-tab="dashboard" onclick="setTab('dashboard')">📊 Dashboard</button>
</div>
<div class="budget-estimate-view">
<div class="budget-shell">
  <div class="budget-form-col" id="budget-form"></div>
  <div class="budget-sum-col">
    <div class="sum-hdr">
      <div class="sum-ev-name" id="sum-ev-name">New Estimate</div>
      <div class="sum-ev-meta" id="sum-ev-meta">Fill in event details to begin</div>
    </div>
    <div class="sum-scroll" id="sum-scroll"></div>
    <div class="sum-actions">
      <button class="sum-btn pri" onclick="saveBudget()" data-requires="staff">💾 Save Estimate</button>
      <button id="apply-btn" class="sum-btn pri" onclick="applyBudgetToEvent()" data-requires="staff">📌 Apply to Event</button>
      <button class="sum-btn sec" onclick="window.print()">🖨 Print / Export</button>
      <button class="sum-btn sec" onclick="newBudget()" data-requires="staff">＋ New Estimate</button>
      <button class="sum-btn sec" onclick="openRatesModal()" data-requires="admin">⚙ Edit Cost Rates</button>
    </div>
  </div>
</div><!-- .budget-shell -->
</div><!-- .budget-estimate-view -->

<div class="budget-views-with-sidebar" id="budget-data-views">
  <aside class="budget-sidebar" id="budget-sidebar"></aside>
  <div class="budget-actuals-view" id="actuals-view"></div>
  <div class="budget-dashboard-view" id="dashboard-view"></div>
</div>
</div><!-- .budget-main -->

<!-- Expense Modal -->
<div class="modal-ov" id="exp-ov" onclick="if(event.target===this)closeExpenseModal()">
  <div class="exp-modal">
    <div class="exp-modal-hdr">
      <h3 id="exp-modal-title">Add Expense</h3>
      <button onclick="closeExpenseModal()" style="background:none;border:none;cursor:pointer;font-size:1.1rem;color:var(--sub);">✕</button>
    </div>
    <div class="exp-modal-body" id="exp-modal-body"></div>
    <div style="padding:12px 18px 16px;border-top:1px solid var(--border);display:flex;gap:8px;">
      <button class="sum-btn pri" style="flex:1;" onclick="saveExpense()">Save Expense</button>
      <button class="sum-btn sec" style="flex:1;" onclick="closeExpenseModal()">Cancel</button>
    </div>
  </div>
</div>

<!-- Receipt Lightbox -->
<div class="receipt-lightbox" id="receipt-lightbox" onclick="closeLightbox()">
  <img id="lightbox-img" src="" alt="Receipt">
</div>

<!-- Rates Modal -->
<div class="modal-ov" id="rates-ov" onclick="if(event.target===this)closeRatesModal()">
  <div class="rates-modal">
    <div class="rates-modal-hdr">
      <h3>Cost Rates</h3>
      <button onclick="closeRatesModal()" style="background:none;border:none;cursor:pointer;font-size:1.1rem;color:var(--sub);">✕</button>
    </div>
    <div class="rates-body" id="rates-body"></div>
    <div style="padding:12px 20px;border-top:1px solid var(--border);display:flex;gap:8px;">
      <button class="sum-btn pri" style="flex:1;" onclick="applyRates()" data-requires="admin">Apply Rates</button>
      <button class="sum-btn sec" style="flex:1;" onclick="resetRates()" data-requires="admin">Reset Defaults</button>
    </div>
  </div>
</div>

<script src="js/shell.js"></script>
<script src="js/budget.js"></script>
</body>
</html>
