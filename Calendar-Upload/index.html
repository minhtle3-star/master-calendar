<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Watermark Master Calendar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=Lato:ital,wght@0,300;0,400;0,700;0,900;1,400&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/shell.css">
  <link rel="stylesheet" href="css/calendar.css?v=3">
</head>
<body>
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>
<script src="js/nav.js?v=4"></script>
<script src="js/roles.js?v=2"></script>
<div class="app">

  <!-- ═══════════════════ HEADER ═══════════════════ -->
  <header class="header">
    <div class="brand" onclick="toggleDrop(this)">
      <div class="brand-w"><span>W</span></div>
      <h1>Master Calendar</h1>
      <span class="app-chevron">▾</span>
      <div class="app-drop">
        <a class="app-drop-item current" href="index.html"><span class="app-drop-icon">📅</span> Calendar<span class="app-drop-check">✓</span></a>
        <a class="app-drop-item" href="admin.html"><span class="app-drop-icon">⚙️</span> Ministry Admin</a>
        <a class="app-drop-item" href="budget.html"><span class="app-drop-icon">💰</span> Budget Planner</a>
        <a class="app-drop-item" href="rooms.html"><span class="app-drop-icon">🏢</span> Room Planner</a>
        <a class="app-drop-item" href="event-request.html"><span class="app-drop-icon">📋</span> Event Request</a>
      </div>
    </div>
    <div class="hdr-divider"></div>
    <div class="hdr-search">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.6)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="search" id="search-input" placeholder="Search events…" />
    </div>
    <span id="event-count"></span>
    <button class="mobile-filter-btn" onclick="toggleMobileSidebar()">☰ Filters</button>
    <div class="view-toggle">
      <button class="view-btn" id="btn-dashboard" onclick="setView('dashboard')">Dashboard</button>
      <button class="view-btn active" id="btn-list"      onclick="setView('list')">List</button>
      <button class="view-btn" id="btn-calendar"  onclick="setView('calendar')">Calendar</button>
      <button class="view-btn" id="btn-heatmap"   onclick="setView('heatmap')">Year</button>
      <button class="view-btn" id="btn-digest"    onclick="setView('digest')">This Week</button>
    </div>
    <!-- Actions dropdown -->
    <div class="cal-actions-wrap" id="cal-actions-wrap">
      <button class="cal-actions-btn" onclick="toggleCalActions()" title="Export, print, manage holds">Actions ▾</button>
      <div class="cal-actions-drop" id="cal-actions-drop">
        <button onclick="exportICal();toggleCalActions()">⬇ Export .ics</button>
        <button onclick="window.print();toggleCalActions()">🖨 Print</button>
        <button onclick="openBlackoutModal();toggleCalActions()" data-requires="admin">🚫 Hold Dates</button>
        <div class="cal-actions-divider"></div>
        <div class="cal-actions-role-label">Viewing as</div>
        <button onclick="AppRole.setRole('admin');toggleCalActions()" id="cal-role-admin">🔑 Admin</button>
        <button onclick="AppRole.setRole('staff');toggleCalActions()" id="cal-role-staff">👤 Staff</button>
        <button onclick="AppRole.setRole('viewer');toggleCalActions()" id="cal-role-viewer">👁 Viewer</button>
      </div>
    </div>
    <button class="hdr-today-btn" onclick="goToToday()">Today</button>
    <button id="theme-toggle" class="theme-btn" onclick="toggleTheme()" title="Toggle dark mode">🌙</button>
  </header>

  <!-- ═══════════════════ BODY ═══════════════════ -->
  <div class="body">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="filter-section">
        <div class="fs-title">Saved Filters</div>
        <div id="saved-filters-list" style="margin-bottom:8px;"></div>
        <div style="display:flex;gap:5px;">
          <input type="text" id="save-filter-name" class="save-filter-input" placeholder="Filter name…" onkeydown="if(event.key==='Enter'){saveCurrentFilter(this.value.trim());this.value='';}" />
          <button class="save-filter-btn" onclick="saveCurrentFilter(document.getElementById('save-filter-name').value.trim());document.getElementById('save-filter-name').value='';">Save</button>
        </div>
      </div>
      <div class="filter-section">
        <div class="fs-title">Date Range</div>
        <div class="date-range">
          <label>From</label>
          <input type="date" id="filter-from" />
          <label>To</label>
          <input type="date" id="filter-to" />
        </div>
      </div>
      <div class="filter-section">
        <div class="fs-title" style="display:flex;justify-content:space-between;align-items:baseline;">Ministry <button class="deselect-btn" id="cat-toggle-btn" onclick="toggleAllCats()">Deselect All</button></div>
        <div class="cb-group" id="cat-filters"></div>
      </div>
      <div class="filter-section" id="sec-cat-filter-section" style="display:none;">
        <div class="fs-title">Also Involves</div>
        <div class="cb-group" id="sec-cat-filters"></div>
      </div>
      <div class="filter-section">
        <div class="fs-title">Support Levels</div>
        <select id="filter-dept">
          <option value="">All Support Teams</option>
          <option>Facilities</option>
          <option>Production</option>
          <option>Comms</option>
          <option>Midweek Kids</option>
          <option>Worship</option>
        </select>
        <div style="margin-top:8px;" class="cb-group" id="status-filters"></div>
      </div>
      <div class="filter-section">
        <div class="fs-title">Status Key</div>
        <div class="legend-grid">
          <div class="legend-row"><div class="legend-pip" style="background:#22c55e;"></div>Green</div>
          <div class="legend-row"><div class="legend-pip" style="background:var(--powder);"></div>Blue</div>
          <div class="legend-row"><div class="legend-pip" style="background:var(--charcoal);"></div>Black</div>
          <div class="legend-row"><div class="legend-pip" style="background:#7b1c1c;"></div>Double Black</div>
        </div>
      </div>
      <button class="reset-btn" onclick="resetFilters()">✕ &nbsp;Reset All Filters</button>
    </aside>

    <!-- MAIN -->
    <main class="main">
      <div id="loading"><div class="spinner"></div><p style="font-size:.85rem;">Loading calendar…</p></div>
      <div id="dashboard-view" style="display:none;"></div>
      <div id="list-view"      style="display:none;"></div>
      <div id="calendar-view"  style="display:none;"></div>
      <div id="digest-view"    style="display:none;"></div>
    </main>

  </div><!-- /.body -->
</div><!-- /.app -->

<!-- ═══════════════ EVENT DETAIL MODAL ═══════════════ -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-hdr" id="modal-hdr">
      <div>
        <div id="modal-cat-tag" style="margin-bottom:6px;"></div>
        <div class="modal-title" id="modal-title"></div>
      </div>
      <button class="modal-close" onclick="closeModalBtn()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<!-- ═══════════════ DAY EVENTS MODAL ═══════════════ -->
<div class="modal-overlay" id="day-modal-overlay" onclick="closeDayModal(event)">
  <div class="modal" id="day-modal">
    <div class="modal-hdr" style="--cat-color:var(--navy);">
      <div>
        <div style="font-family:'Oswald',sans-serif;font-size:.66rem;letter-spacing:.12em;text-transform:uppercase;color:var(--slate);margin-bottom:4px;">Day View</div>
        <div class="modal-title" id="day-modal-title"></div>
      </div>
      <button class="modal-close" onclick="closeDayModalBtn()">✕</button>
    </div>
    <div class="modal-body" id="day-modal-body"></div>
  </div>
</div>

<script src="js/shell.js"></script>
<script src="js/calendar.js"></script>
</body>
</html>
