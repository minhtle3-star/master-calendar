<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Watermark Master Calendar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=Lato:ital,wght@0,300;0,400;0,700;0,900;1,400&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    /* ═══════════════════════════════════════════
       DESIGN TOKENS — Watermark Brand Guide 2020
    ═══════════════════════════════════════════ */
    :root {
      --navy:    #003A5D;   /* Primary brand navy    */
      --navy-d:  #002340;   /* Darker navy for hover */
      --charcoal:#1D252C;   /* Dark charcoal         */
      --slate:   #48565A;   /* Muted slate/teal      */
      --cream:   #F2F0EC;   /* Off-white/cream bg    */
      --powder:  #B9D2DC;   /* Soft powder blue      */
      --white:   #FFFFFF;
      --border:  #DDE3E7;
      --text:    #1D252C;
      --sub:     #5A6872;
      --bg:      #EDEAE5;   /* Warm page background  */
      --green:   #22c55e;
      --alert:   #8B3A28;   /* Brick red for high priority */
    }

    /* ═══════════════════════════════════════════
       RESET & BASE
    ═══════════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: 'Lato', sans-serif; background: var(--bg); color: var(--text); font-size: 15px; }
    h1,h2,h3,h4 { font-family: 'Oswald', sans-serif; }

    /* ═══════════════════════════════════════════
       APP SHELL
    ═══════════════════════════════════════════ */
    .app  { display: flex; flex-direction: column; height: 100vh; }
    .body { display: flex; flex: 1; overflow: hidden; }
    .main { flex: 1; overflow-y: auto; padding: 24px; }

    /* ═══════════════════════════════════════════
       HEADER
    ═══════════════════════════════════════════ */
    .header {
      background: linear-gradient(100deg, var(--charcoal) 0%, var(--navy) 100%);
      color: white; padding: 0 20px; height: 64px;
      display: flex; align-items: center; gap: 14px;
      box-shadow: 0 2px 16px rgba(0,0,0,.35); flex-shrink: 0; z-index: 20;
    }
    .brand { display: flex; align-items: center; gap: 11px; flex-shrink: 0; }
    .brand-w {
      width: 34px; height: 34px; background: white; border-radius: 5px;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .brand-w span {
      font-family: 'Oswald', sans-serif; font-weight: 700; font-size: 1.05rem;
      color: var(--navy); letter-spacing: -.02em;
    }
    .brand h1 {
      font-family: 'Oswald', sans-serif; font-weight: 400; font-size: 1rem;
      letter-spacing: .14em; text-transform: uppercase; color: white; white-space: nowrap;
    }
    .hdr-divider { width: 1px; height: 26px; background: rgba(255,255,255,.18); flex-shrink: 0; }
    .hdr-search {
      display: flex; align-items: center; gap: 8px;
      background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.15);
      border-radius: 5px; padding: 6px 11px; flex: 1; max-width: 300px;
      transition: background .15s;
    }
    .hdr-search:focus-within { background: rgba(255,255,255,.18); border-color: rgba(255,255,255,.3); }
    .hdr-search input {
      background: none; border: none; outline: none; color: white;
      font-family: 'Lato', sans-serif; font-size: .85rem; width: 100%;
    }
    .hdr-search input::placeholder { color: rgba(255,255,255,.45); }
    #event-count { font-size: .75rem; color: rgba(255,255,255,.5); white-space: nowrap; margin-left: auto; }
    .view-toggle { display: flex; gap: 3px; }
    .view-btn {
      border: 1px solid rgba(255,255,255,.18); background: rgba(255,255,255,.07);
      color: rgba(255,255,255,.75); border-radius: 4px; padding: 5px 12px;
      cursor: pointer; font-family: 'Oswald', sans-serif; font-size: .75rem;
      font-weight: 400; letter-spacing: .1em; text-transform: uppercase; transition: all .15s;
    }
    .view-btn.active { background: var(--powder); color: var(--charcoal); border-color: var(--powder); font-weight: 600; }
    .view-btn:hover:not(.active) { background: rgba(255,255,255,.14); color: white; }

    /* ═══════════════════════════════════════════
       SIDEBAR
    ═══════════════════════════════════════════ */
    .sidebar {
      width: 232px; flex-shrink: 0; background: white;
      border-right: 1px solid var(--border); overflow-y: auto;
      padding: 18px 15px; display: flex; flex-direction: column; gap: 20px;
    }
    .fs-title {
      font-family: 'Oswald', sans-serif; font-weight: 500; font-size: .7rem;
      letter-spacing: .13em; text-transform: uppercase; color: var(--navy);
      padding-bottom: 6px; border-bottom: 2px solid var(--cream); margin-bottom: 8px;
    }
    .filter-section select, .filter-section input[type="date"] {
      width: 100%; padding: 6px 8px; border: 1px solid var(--border); border-radius: 4px;
      font-family: 'Lato', sans-serif; font-size: .82rem; color: var(--text);
      background: var(--cream); cursor: pointer; outline: none;
    }
    .filter-section select:focus, .filter-section input[type="date"]:focus {
      border-color: var(--navy); box-shadow: 0 0 0 3px rgba(0,58,93,.1);
    }
    .date-range { display: flex; flex-direction: column; gap: 4px; }
    .date-range label { font-size: .72rem; font-weight: 700; letter-spacing: .05em; color: var(--sub); }
    .cb-group { display: flex; flex-direction: column; gap: 2px; }
    .cb-item {
      display: flex; align-items: center; gap: 7px; padding: 3px 5px;
      border-radius: 4px; cursor: pointer; font-size: .81rem; color: var(--text); transition: background .1s;
    }
    .cb-item:hover { background: var(--cream); }
    .cb-item input { cursor: pointer; accent-color: var(--navy); width: 13px; height: 13px; }
    .cat-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .legend-grid { display: flex; flex-direction: column; gap: 6px; font-size: .77rem; color: var(--text); }
    .legend-row { display: flex; align-items: center; gap: 7px; }
    .legend-pip { width: 22px; height: 8px; border-radius: 8px; flex-shrink: 0; }
    .reset-btn {
      width: 100%; padding: 7px; border: 1px solid var(--border); border-radius: 4px;
      background: var(--cream); color: var(--sub); font-family: 'Oswald', sans-serif;
      font-size: .72rem; font-weight: 500; letter-spacing: .09em; text-transform: uppercase;
      cursor: pointer; transition: all .15s;
    }
    .reset-btn:hover { background: #fee2e2; border-color: #fca5a5; color: #dc2626; }

    /* ═══════════════════════════════════════════
       LOADING SPINNER
    ═══════════════════════════════════════════ */
    #loading {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; height: 65vh; gap: 14px; color: var(--sub);
    }
    .spinner {
      width: 36px; height: 36px; border: 3px solid var(--border);
      border-top-color: var(--navy); border-radius: 50%; animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ═══════════════════════════════════════════
       DASHBOARD
    ═══════════════════════════════════════════ */
    #dashboard-view { display: flex; flex-direction: column; gap: 22px; }
    .dash-row-label {
      font-family: 'Oswald', sans-serif; font-weight: 400; font-size: .7rem;
      letter-spacing: .14em; text-transform: uppercase; color: var(--slate); margin-bottom: 10px;
    }

    /* Stat cards */
    .stat-cards { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
    .stat-card {
      background: white; border-radius: 8px; border: 1px solid var(--border);
      padding: 16px 18px; border-top: 4px solid var(--navy);
      display: flex; flex-direction: column; gap: 3px;
    }
    .stat-card.c-powder { border-top-color: var(--powder); }
    .stat-card.c-slate  { border-top-color: var(--slate); }
    .stat-card.c-alert  { border-top-color: var(--alert); }
    .stat-label { font-size: .68rem; font-weight: 900; letter-spacing: .09em; text-transform: uppercase; color: var(--sub); }
    .stat-val   { font-family: 'Oswald', sans-serif; font-size: 2.6rem; font-weight: 600; color: var(--charcoal); line-height: 1; margin: 2px 0; }
    .stat-sub   { font-size: .73rem; color: var(--sub); }

    /* Chart cards */
    .dash-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .chart-card {
      background: white; border-radius: 8px; border: 1px solid var(--border); padding: 18px 20px;
    }
    .chart-card h3 {
      font-family: 'Oswald', sans-serif; font-weight: 500; font-size: .88rem;
      letter-spacing: .07em; text-transform: uppercase; color: var(--charcoal); margin-bottom: 14px;
    }
    .chart-card h3 .chart-sub {
      font-family: 'Lato', sans-serif; font-weight: 400; font-size: .72rem;
      text-transform: none; letter-spacing: 0; color: var(--sub); margin-left: 4px;
    }
    .chart-wrap { position: relative; }

    /* Upcoming events */
    .upcoming-list { display: flex; flex-direction: column; gap: 6px; max-height: 380px; overflow-y: auto; }
    .up-item {
      display: flex; align-items: flex-start; gap: 11px; padding: 9px 11px;
      border-radius: 6px; background: var(--cream); border-left: 3px solid var(--cat-color, var(--slate));
      cursor: pointer; transition: background .1s;
    }
    .up-item:hover { background: #E5E1DB; }
    .up-date { text-align: center; min-width: 38px; flex-shrink: 0; }
    .up-mo  { font-size: .6rem; font-weight: 900; text-transform: uppercase; letter-spacing: .07em; color: var(--sub); }
    .up-day { font-family: 'Oswald', sans-serif; font-size: 1.45rem; font-weight: 600; color: var(--charcoal); line-height: 1.1; }
    .up-name { font-size: .83rem; font-weight: 700; color: var(--charcoal); }
    .up-meta { font-size: .71rem; color: var(--sub); margin-top: 2px; }

    /* Day of week bars */
    .dow-bars { display: flex; flex-direction: column; gap: 7px; }
    .dow-row  { display: flex; align-items: center; gap: 10px; }
    .dow-lbl  { font-size: .76rem; font-weight: 700; color: var(--sub); width: 28px; text-align: right; flex-shrink: 0; }
    .dow-track { flex: 1; background: var(--cream); border-radius: 3px; height: 17px; overflow: hidden; }
    .dow-fill  { height: 100%; background: var(--navy); border-radius: 3px; transition: width .6s cubic-bezier(.4,0,.2,1); min-width: 3px; }
    .dow-cnt   { font-size: .74rem; font-weight: 700; color: var(--sub); width: 36px; flex-shrink: 0; }

    /* ═══════════════════════════════════════════
       LIST VIEW
    ═══════════════════════════════════════════ */
    #list-view { display: flex; flex-direction: column; gap: 26px; }
    .day-hdr { display: flex; align-items: center; gap: 11px; margin-bottom: 10px; }
    .day-badge {
      background: var(--navy); color: white; border-radius: 5px; padding: 4px 11px;
      font-family: 'Oswald', sans-serif; font-weight: 500; font-size: .75rem;
      letter-spacing: .09em; text-transform: uppercase; white-space: nowrap;
    }
    .day-badge.is-today { background: var(--charcoal); }
    .day-name { font-size: .88rem; font-weight: 700; color: var(--text); }
    .today-chip {
      background: #EBF4FA; color: var(--navy); font-family: 'Oswald', sans-serif;
      font-size: .65rem; font-weight: 500; letter-spacing: .09em; text-transform: uppercase;
      padding: 2px 8px; border-radius: 9px; vertical-align: middle; margin-left: 5px;
    }
    .day-line { flex: 1; height: 1px; background: var(--border); }
    .events-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(285px,1fr)); gap: 9px; }

    .event-card {
      background: white; border-radius: 7px; border: 1px solid var(--border); padding: 13px 15px;
      cursor: pointer; transition: box-shadow .15s, transform .1s;
      border-left: 4px solid var(--cat-color, var(--slate));
      display: flex; flex-direction: column; gap: 7px;
    }
    .event-card:hover { box-shadow: 0 5px 20px rgba(0,0,0,.1); transform: translateY(-1px); }
    .ev-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
    .ev-title { font-size: .87rem; font-weight: 700; color: var(--charcoal); line-height: 1.35; }
    .cat-tag {
      padding: 2px 7px; border-radius: 2px; font-family: 'Oswald', sans-serif;
      font-size: .6rem; font-weight: 500; letter-spacing: .08em; text-transform: uppercase;
      white-space: nowrap; flex-shrink: 0; color: white;
    }
    .ev-meta { font-size: .74rem; color: var(--sub); display: flex; flex-direction: column; gap: 3px; }
    .meta-row { display: flex; align-items: center; gap: 5px; }
    .dept-badges { display: flex; flex-wrap: wrap; gap: 3px; }
    .d-badge { display: inline-flex; align-items: center; gap: 2px; padding: 2px 6px; border-radius: 2px; font-size: .65rem; font-weight: 700; }
    .d-badge .dn { opacity: .65; font-weight: 400; }

    /* ═══════════════════════════════════════════
       CALENDAR VIEW
    ═══════════════════════════════════════════ */
    .cal-nav {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px;
    }
    .cal-nav h2 {
      font-family: 'Oswald', sans-serif; font-weight: 500; font-size: 1.15rem;
      letter-spacing: .07em; text-transform: uppercase; color: var(--charcoal);
    }
    .cal-btn {
      background: white; border: 1px solid var(--border); border-radius: 4px;
      width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--slate); transition: all .15s; font-size: .95rem;
    }
    .cal-btn:hover { background: var(--navy); color: white; border-color: var(--navy); }
    .today-btn {
      padding: 5px 13px; background: white; border: 1px solid var(--border); border-radius: 4px;
      font-family: 'Oswald', sans-serif; font-size: .73rem; font-weight: 500;
      letter-spacing: .08em; text-transform: uppercase; cursor: pointer; color: var(--slate); transition: all .15s;
    }
    .today-btn:hover { background: var(--navy); color: white; border-color: var(--navy); }
    .cal-wrap { background: white; border-radius: 9px; border: 1px solid var(--border); overflow: hidden; }
    .cal-wkdays { display: grid; grid-template-columns: repeat(7,1fr); background: var(--navy); }
    .cal-wkday {
      text-align: center; padding: 9px 4px;
      font-family: 'Oswald', sans-serif; font-weight: 400; font-size: .69rem;
      letter-spacing: .12em; text-transform: uppercase; color: rgba(255,255,255,.7);
    }
    .cal-days { display: grid; grid-template-columns: repeat(7,1fr); }
    .cal-day {
      min-height: 108px; border-right: 1px solid #ede9e3; border-bottom: 1px solid #ede9e3;
      padding: 7px 5px; cursor: pointer; transition: background .1s;
    }
    .cal-day:hover { background: var(--cream); }
    .cal-day.other-mo { background: #F8F6F2; }
    .cal-day.is-today  { background: #EBF4FA; }
    .cal-day-num {
      font-family: 'Oswald', sans-serif; font-size: .8rem; font-weight: 500; color: var(--slate);
      width: 23px; height: 23px; display: flex; align-items: center; justify-content: center; margin-bottom: 4px;
    }
    .cal-day.is-today .cal-day-num { background: var(--navy); color: white; border-radius: 50%; }
    .cal-day.other-mo .cal-day-num { color: #C5BFB5; }
    .cal-evs { display: flex; flex-direction: column; gap: 2px; }
    .cal-pill {
      font-size: .64rem; padding: 1px 5px; border-radius: 2px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      color: white; font-weight: 700; cursor: pointer; letter-spacing: .02em;
    }
    .cal-more { font-size: .65rem; color: var(--sub); font-weight: 700; padding: 1px 4px; cursor: pointer; }

    /* ═══════════════════════════════════════════
       MODALS
    ═══════════════════════════════════════════ */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.5);
      display: flex; align-items: center; justify-content: center; z-index: 100; padding: 20px;
      opacity: 0; pointer-events: none; transition: opacity .2s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal {
      background: white; border-radius: 11px; width: 100%; max-width: 560px;
      max-height: 88vh; overflow-y: auto;
      box-shadow: 0 24px 64px rgba(0,0,0,.32);
      transform: translateY(10px); transition: transform .2s;
    }
    .modal-overlay.open .modal { transform: translateY(0); }
    .modal-hdr {
      padding: 18px 22px 14px; border-bottom: 1px solid var(--border);
      display: flex; align-items: flex-start; justify-content: space-between; gap: 12px;
      border-top: 5px solid var(--cat-color, var(--slate));
    }
    .modal-title {
      font-family: 'Oswald', sans-serif; font-weight: 600; font-size: 1.15rem;
      color: var(--charcoal); line-height: 1.25;
    }
    .modal-close {
      background: none; border: none; cursor: pointer; color: var(--sub);
      width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: all .15s; font-size: 1rem;
    }
    .modal-close:hover { background: #fee2e2; color: #dc2626; }
    .modal-body { padding: 18px 22px; display: flex; flex-direction: column; gap: 16px; }
    .ms-title {
      font-family: 'Oswald', sans-serif; font-size: .68rem; font-weight: 500;
      text-transform: uppercase; letter-spacing: .11em; color: var(--slate); margin-bottom: 6px;
    }
    .mi-row { display: flex; align-items: flex-start; gap: 9px; color: var(--text); font-size: .87rem; }
    .mi-icon { width: 15px; height: 15px; flex-shrink: 0; margin-top: 2px; opacity: .5; }
    .dept-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }
    .dept-card { border: 1px solid var(--border); border-radius: 6px; padding: 9px 11px; }
    .dept-card-name { font-size: .67rem; font-weight: 700; color: var(--sub); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 3px; }
    .dept-card-status { font-size: .86rem; font-weight: 700; }
    .dept-card.green  { background: #f0fdf4; border-color: #86efac; }
    .dept-card.green  .dept-card-status { color: #15803d; }
    .dept-card.blue   { background: #EBF4FA; border-color: var(--powder); }
    .dept-card.blue   .dept-card-status { color: #1558A0; }
    .dept-card.black  { background: var(--charcoal); border-color: var(--slate); }
    .dept-card.black  .dept-card-name   { color: #9ca3af; }
    .dept-card.black  .dept-card-status { color: white; }
    .dept-card.na     { background: var(--cream); border-color: var(--border); }
    .dept-card.na     .dept-card-status { color: var(--sub); }

    /* Day modal — category groups */
    .day-cat-section { margin-bottom: 16px; }
    .day-cat-hdr {
      display: flex; align-items: center; gap: 7px;
      font-family: 'Oswald', sans-serif; font-weight: 500; font-size: .78rem;
      letter-spacing: .08em; text-transform: uppercase; color: var(--charcoal);
      padding-bottom: 5px; margin-bottom: 6px;
      border-bottom: 2px solid var(--cat-color, var(--slate));
    }
    .day-cat-pip { width: 8px; height: 8px; border-radius: 50%; background: var(--cat-color, var(--slate)); flex-shrink: 0; }
    .day-cat-count { font-weight: 300; font-size: .68rem; opacity: .6; }
    .day-ev-list { display: flex; flex-direction: column; gap: 4px; }
    .day-ev-item {
      display: flex; align-items: flex-start; gap: 10px; padding: 8px 10px;
      background: var(--cream); border-radius: 5px; cursor: pointer;
      border-left: 3px solid var(--cat-color, var(--slate)); transition: background .1s;
    }
    .day-ev-item:hover { background: #E5E1DB; }
    .day-ev-time { font-size: .73rem; color: var(--sub); white-space: nowrap; min-width: 70px; padding-top: 1px; font-weight: 700; }
    .day-ev-name { font-size: .84rem; font-weight: 700; color: var(--charcoal); }
    .day-ev-loc  { font-size: .7rem; color: var(--sub); margin-top: 2px; }

    /* ═══════════════════════════════════════════
       EMPTY STATE
    ═══════════════════════════════════════════ */
    .empty-state {
      text-align: center; padding: 60px 20px; color: var(--sub);
      display: flex; flex-direction: column; align-items: center; gap: 11px;
    }
    .empty-state h3 { font-family: 'Oswald', sans-serif; font-size: 1.05rem; color: var(--slate); font-weight: 500; }
    .empty-state p  { font-size: .83rem; }

    /* ═══════════════════════════════════════════
       SCROLLBAR
    ═══════════════════════════════════════════ */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--slate); }

    /* ═══════════════════════════════════════════
       RESPONSIVE
    ═══════════════════════════════════════════ */
    @media (max-width: 960px) {
      .stat-cards { grid-template-columns: 1fr 1fr; }
      .dash-2col  { grid-template-columns: 1fr; }
    }
    @media (max-width: 700px) {
      .sidebar { display: none; }
      .events-grid { grid-template-columns: 1fr; }
      .cal-day { min-height: 70px; }
      .stat-cards { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
<div class="app">

  <!-- ═══════════════════ HEADER ═══════════════════ -->
  <header class="header">
    <div class="brand">
      <div class="brand-w"><span>W</span></div>

<script>
/* ═══════════════════════════════════════════════════
   CONSTANTS
═══════════════════════════════════════════════════ */
const CATEGORIES = {
  'Sunday Services':       { color: '#003A5D', pattern: /sunday service|watermark en espanol|^wake\b/i },
  'Kids Ministry':         { color: '#B5712A', pattern: /\bkids\b|preschool|kaleidoscope|\bk1\b|23 kids|45 kids/i },
  'Ministry Programs':     { color: '#1E5E7A', pattern: /re:generation|re\|engage|legacy \d|great question|frontlines|gather leadership|careers in motion|trail life/i },
  'Groups & Discipleship': { color: '#2E6B5E', pattern: /small group|discipleship group|community group|asida|multiplying discipleship/i },
  'Care & Support':        { color: '#7A3E5C', pattern: /support group|care ministry|feeding support|infertility|miscarriage|prenatal/i },
  'Special Events':        { color: '#8B3A28', pattern: /baptism|holiday|retreat|trip information|young adult trip|pine cove|community group weekend/i },
  'Administrative':        { color: '#48565A', pattern: /staff prayer|leadership meeting|leadership team|team meeting|square one|staff |connecting team/i },
};

const DEPT_NAMES = ['Facilities','Production','Comms','Midweek Kids','Worship'];
const WEEKDAYS   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTHS     = ['January','February','March','April','May','June','July','August','September','October','November','December'];

/* ═══════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════ */
let allEvents      = [];
let filteredEvents = [];
let currentView    = 'list';
let calendarDate   = new Date();
let chartInstances = {};
let activeFilters  = { search:'', categories: new Set(), dept:'', statuses: new Set(), from: null, to: null };

/* ═══════════════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════════════ */
function categorizeEvent(name) {
  for (const [cat, cfg] of Object.entries(CATEGORIES))
    if (cfg.pattern.test(name)) return cat;
  return 'Other';
}
function catColor(cat) { return (CATEGORIES[cat]||{}).color || '#6B7880'; }

function parseDetails(text) {
  const depts = {}; DEPT_NAMES.forEach(d => depts[d] = 'N/A');
  const extra = []; if (!text) return { depts, extra:'' };
  const lines = text.split('\n').map(l=>l.trim()).filter(Boolean);
  for (const line of lines) {
    let matched = false;
    for (const dept of DEPT_NAMES) {
      const m = line.match(new RegExp(`^${dept}\\s*[-–]\\s*(.+)`,'i'));
      if (m) { depts[dept] = normalizeStatus(m[1].trim()); matched = true; break; }
    }
    if (!matched) extra.push(line);
  }
  return { depts, extra: extra.join(' | ') };
}

function normalizeStatus(raw) {
  if (!raw) return 'N/A';
  const t = raw.trim();
  if (/^green/i.test(t)) return 'Green';
  if (/^blue/i.test(t))  return 'Blue';
  if (/^black/i.test(t)) return 'Black';
  if (/^n\/?a/i.test(t)) return 'N/A';
  const first = t.split(/[\s;,(]/)[0];
  if (/green/i.test(first)) return 'Green';
  if (/blue/i.test(first))  return 'Blue';
  if (/black/i.test(first)) return 'Black';
  return 'N/A';
}

function parseDate(str) {
  if (!str) return null;
  const parts = str.split('/'); if (parts.length !== 3) return null;
  const [m,d,y] = parts.map(Number);
  return new Date(y, m-1, d);
}

function fmtTime(t) {
  if (!t) return '';
  const [hm, ap] = t.split(' ');
  const [h, mi] = hm.split(':');
  let hour = parseInt(h);
  const ampm = (ap||'').toUpperCase() || (hour>=12?'PM':'AM');
  if (ampm==='PM' && hour<12) hour+=12;
  if (ampm==='AM' && hour===12) hour=0;
  return new Date(2000,0,1,hour,parseInt(mi||0)).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true});
}

function fmtDateFull(d) {
  return d.toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
}
function fmtDateKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function statusCls(s) {
  return s==='Green'?'green' : s==='Blue'?'blue' : s==='Black'?'black' : 'na';
}
function esc(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ═══════════════════════════════════════════════════
   LOAD CSV
═══════════════════════════════════════════════════ */
async function loadCSV() {
  const resp = await fetch('calendar.csv');
  const text = await resp.text();
  Papa.parse(text, {
    header: true, skipEmptyLines: true,
    complete(results) {
      allEvents = results.data.map((row,i) => {
        const date = parseDate(row['Start Date']); if (!date) return null;
        const { depts, extra } = parseDetails(row['Details']);
        let loc = (row['Location']||'').trim();
        if (!loc && extra) { const fl=extra.split('|')[0].trim(); if (fl && !DEPT_NAMES.some(d=>fl.includes(d))) loc=fl; }
        return { id:i, subject:row['Subject']||'', date, startTime:row['Start Time']||'', endTime:row['End Time']||'', allDay:row['All Day Event']==='True', location:loc, depts, category:categorizeEvent(row['Subject']||'') };
      }).filter(Boolean).sort((a,b)=>a.date-b.date);
      buildCatFilters(); buildStatusFilters();
      applyFilters(); renderCurrentView();
      document.getElementById('loading').style.display = 'none';
    },
    error() {
      document.getElementById('loading').innerHTML = '<p style="color:#dc2626;text-align:center;padding:40px;">Failed to load calendar.csv. Make sure it is in the same folder as index.html.</p>';
    }
  });
}

/* ═══════════════════════════════════════════════════
   FILTER UI
═══════════════════════════════════════════════════ */
function buildCatFilters() {
  const cats = [...new Set(allEvents.map(e=>e.category))].sort();
  const el = document.getElementById('cat-filters'); el.innerHTML = '';
  for (const cat of cats) {
    const id = 'cat-'+cat.replace(/\s/g,'-');
    el.insertAdjacentHTML('beforeend',
      `<label class="cb-item" for="${id}">
        <input type="checkbox" id="${id}" value="${esc(cat)}" checked onchange="onCatChange(this)"/>
        <span class="cat-dot" style="background:${catColor(cat)}"></span>
        <span>${esc(cat)}</span>
       </label>`);
    activeFilters.categories.add(cat);
  }
}
function buildStatusFilters() {
  const el = document.getElementById('status-filters'); el.innerHTML = '';
  for (const {label,val} of [{label:'Green — Normal',val:'Green'},{label:'Blue — Enhanced',val:'Blue'},{label:'Black — High Priority',val:'Black'}]) {
    const id='st-'+val;
    el.insertAdjacentHTML('beforeend',
      `<label class="cb-item" for="${id}">
        <input type="checkbox" id="${id}" value="${val}" onchange="onStatusChange(this)"/>
        <span>${label}</span>
       </label>`);
  }
}

/* ═══════════════════════════════════════════════════
   FILTER LOGIC
═══════════════════════════════════════════════════ */
function applyFilters() {
  const {search,categories,dept,statuses,from,to} = activeFilters;
  filteredEvents = allEvents.filter(ev => {
    if (search && !ev.subject.toLowerCase().includes(search)) return false;
    if (categories.size > 0 && !categories.has(ev.category)) return false;
    if (from && ev.date < from) return false;
    if (to   && ev.date > to)   return false;
    if (statuses.size > 0) {
      const ds = dept ? [dept] : DEPT_NAMES;
      if (!ds.some(d => statuses.has(ev.depts[d]))) return false;
    }
    return true;
  });
  document.getElementById('event-count').textContent =
    filteredEvents.length.toLocaleString() + ' event' + (filteredEvents.length!==1?'s':'');
}

/* ═══════════════════════════════════════════════════
   FILTER HANDLERS
═══════════════════════════════════════════════════ */
document.getElementById('search-input').addEventListener('input', e => {
  activeFilters.search = e.target.value.toLowerCase().trim(); applyFilters(); renderCurrentView();
});
document.getElementById('filter-from').addEventListener('change', e => {
  activeFilters.from = e.target.value ? new Date(e.target.value+'T00:00:00') : null; applyFilters(); renderCurrentView();
});
document.getElementById('filter-to').addEventListener('change', e => {
  activeFilters.to = e.target.value ? new Date(e.target.value+'T23:59:59') : null; applyFilters(); renderCurrentView();
});
document.getElementById('filter-dept').addEventListener('change', e => {
  activeFilters.dept = e.target.value; applyFilters(); renderCurrentView();
});
function onCatChange(cb) {
  if (cb.checked) activeFilters.categories.add(cb.value); else activeFilters.categories.delete(cb.value);
  applyFilters(); renderCurrentView();
}
function onStatusChange(cb) {
  if (cb.checked) activeFilters.statuses.add(cb.value); else activeFilters.statuses.delete(cb.value);
  applyFilters(); renderCurrentView();
}
function resetFilters() {
  activeFilters = { search:'', categories: new Set(), dept:'', statuses: new Set(), from:null, to:null };
  document.getElementById('search-input').value = '';
  document.getElementById('filter-from').value  = '';
  document.getElementById('filter-to').value    = '';
  document.getElementById('filter-dept').value  = '';
  document.querySelectorAll('#cat-filters input').forEach(cb => { cb.checked=true; activeFilters.categories.add(cb.value); });
  document.querySelectorAll('#status-filters input').forEach(cb => { cb.checked=false; });
  applyFilters(); renderCurrentView();
}

/* ═══════════════════════════════════════════════════
   VIEW CONTROL
═══════════════════════════════════════════════════ */
function setView(v) {
  currentView = v;
  ['dashboard','list','calendar'].forEach(x =>
    document.getElementById('btn-'+x).classList.toggle('active', x===v)
  );
  renderCurrentView();
}
function renderCurrentView() {
  ['dashboard-view','list-view','calendar-view'].forEach(id => document.getElementById(id).style.display='none');
  if (currentView==='dashboard') { renderDashboard(); document.getElementById('dashboard-view').style.display='flex'; }
  else if (currentView==='list') { renderList(); document.getElementById('list-view').style.display='flex'; }
  else { renderCalendar(); document.getElementById('calendar-view').style.display='block'; }
}

/* ═══════════════════════════════════════════════════
   DASHBOARD
═══════════════════════════════════════════════════ */
function renderDashboard() {
  const today = new Date(); today.setHours(0,0,0,0);
  const soMonth = new Date(today.getFullYear(), today.getMonth(), 1);
  const eoMonth = new Date(today.getFullYear(), today.getMonth()+1, 0);
  const next30  = new Date(today); next30.setDate(next30.getDate()+30);

  const total     = filteredEvents.length;
  const thisMonth = filteredEvents.filter(e => e.date >= soMonth && e.date <= eoMonth).length;
  const upcoming  = filteredEvents.filter(e => e.date >= today && e.date <= next30).length;
  const highPri   = filteredEvents.filter(e => DEPT_NAMES.some(d => e.depts[d]==='Black')).length;

  // Category counts
  const catCounts = {};
  for (const ev of filteredEvents) catCounts[ev.category] = (catCounts[ev.category]||0)+1;

  // Monthly counts — 12 months spanning 3 before today to 8 after
  const monthMap = {};
  for (const ev of filteredEvents) {
    const k = `${ev.date.getFullYear()}-${ev.date.getMonth()}`;
    monthMap[k] = (monthMap[k]||0)+1;
  }
  const mLabels=[], mData=[];
  for (let i=-3; i<=8; i++) {
    const d = new Date(today.getFullYear(), today.getMonth()+i, 1);
    mLabels.push(MONTHS[d.getMonth()].slice(0,3)+' \''+String(d.getFullYear()).slice(2));
    mData.push(monthMap[`${d.getFullYear()}-${d.getMonth()}`]||0);
  }

  // Dept status
  const dsc = {};
  DEPT_NAMES.forEach(d => dsc[d]={Green:0,Blue:0,Black:0,NA:0});
  for (const ev of filteredEvents)
    for (const dept of DEPT_NAMES) {
      const s = ev.depts[dept]||'N/A';
      dsc[dept][['Green','Blue','Black'].includes(s)?s:'NA']++;
    }

  // Day of week
  const dow = [0,0,0,0,0,0,0];
  for (const ev of filteredEvents) dow[ev.date.getDay()]++;
  const maxDow = Math.max(...dow)||1;

  // Upcoming list (next 30 days, up to 25)
  const upList = filteredEvents.filter(e=>e.date>=today&&e.date<=next30).slice(0,25);

  const el = document.getElementById('dashboard-view');
  el.innerHTML = `
    <!-- STAT CARDS -->
    <div>
      <div class="dash-row-label">Overview</div>
      <div class="stat-cards">
        <div class="stat-card">
          <div class="stat-label">Total Events</div>
          <div class="stat-val">${total.toLocaleString()}</div>
          <div class="stat-sub">matching current filters</div>
        </div>
        <div class="stat-card c-powder">
          <div class="stat-label">This Month</div>
          <div class="stat-val">${thisMonth.toLocaleString()}</div>
          <div class="stat-sub">${MONTHS[today.getMonth()]} ${today.getFullYear()}</div>
        </div>
        <div class="stat-card c-slate">
          <div class="stat-label">Next 30 Days</div>
          <div class="stat-val">${upcoming.toLocaleString()}</div>
          <div class="stat-sub">upcoming events</div>
        </div>
        <div class="stat-card c-alert">
          <div class="stat-label">High Priority</div>
          <div class="stat-val">${highPri.toLocaleString()}</div>
          <div class="stat-sub">events with Black status</div>
        </div>
      </div>
    </div>

    <!-- CHARTS ROW 1 -->
    <div class="dash-2col">
      <div class="chart-card">
        <h3>Events by Category</h3>
        <div class="chart-wrap" style="height:240px;"><canvas id="chart-cat"></canvas></div>
      </div>
      <div class="chart-card">
        <h3>Events by Month <span class="chart-sub">— rolling 12 months</span></h3>
        <div class="chart-wrap" style="height:240px;"><canvas id="chart-month"></canvas></div>
      </div>
    </div>

    <!-- CHARTS ROW 2 -->
    <div class="dash-2col">
      <div class="chart-card">
        <h3>Department Status Breakdown</h3>
        <div class="chart-wrap" style="height:240px;"><canvas id="chart-dept"></canvas></div>
      </div>
      <div class="chart-card">
        <h3>Upcoming Events <span class="chart-sub">— next 30 days</span></h3>
        <div class="upcoming-list">
          ${upList.length===0
            ? '<p style="color:var(--sub);font-size:.83rem;">No upcoming events in the next 30 days.</p>'
            : upList.map(ev => {
                const color = catColor(ev.category);
                const t = ev.allDay ? 'All Day' : (ev.startTime ? fmtTime(ev.startTime) : '');
                return `<div class="up-item" style="--cat-color:${color}" onclick="openEvent(${ev.id})">
                  <div class="up-date">
                    <div class="up-mo">${MONTHS[ev.date.getMonth()].slice(0,3)}</div>
                    <div class="up-day">${ev.date.getDate()}</div>
                  </div>
                  <div>
                    <div class="up-name">${esc(ev.subject)}</div>
                    <div class="up-meta">${esc(t)}${ev.location?' · '+esc(ev.location):''}</div>
                  </div>
                </div>`;
              }).join('')}
        </div>
      </div>
    </div>

    <!-- DAY OF WEEK -->
    <div class="chart-card">
      <h3>Busiest Days of the Week</h3>
      <div class="dow-bars">
        ${WEEKDAYS.map((day,i)=>`
          <div class="dow-row">
            <div class="dow-lbl">${day}</div>
            <div class="dow-track"><div class="dow-fill" style="width:${Math.round(dow[i]/maxDow*100)}%"></div></div>
            <div class="dow-cnt">${dow[i].toLocaleString()}</div>
          </div>`).join('')}
      </div>
    </div>`;

  // Destroy previous charts then rebuild
  destroyCharts();
  Chart.defaults.font.family = "'Lato', sans-serif";
  Chart.defaults.color = '#5A6872';

  // 1 — Category doughnut
  const cLabels = Object.keys(catCounts);
  chartInstances.cat = new Chart(document.getElementById('chart-cat'), {
    type: 'doughnut',
    data: {
      labels: cLabels,
      datasets: [{ data: cLabels.map(k=>catCounts[k]), backgroundColor: cLabels.map(catColor),
                   borderWidth: 2, borderColor: 'white', hoverOffset: 8 }]
    },
    options: {
      cutout: '60%',
      plugins: {
        legend: { position:'right', labels:{ boxWidth:11, padding:9, font:{size:11} } },
        tooltip: { callbacks:{ label: ctx=>` ${ctx.label}: ${ctx.parsed.toLocaleString()}` } }
      }
    }
  });

  // 2 — Monthly bar
  chartInstances.month = new Chart(document.getElementById('chart-month'), {
    type: 'bar',
    data: {
      labels: mLabels,
      datasets: [{ label:'Events', data: mData,
                   backgroundColor: mLabels.map((_,i) => i===3?'#B9D2DC':'#003A5D'),
                   borderRadius: 3, hoverBackgroundColor:'#1E5E7A' }]
    },
    options: {
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{display:false} },
      scales:{
        x:{ grid:{display:false}, ticks:{font:{size:10}} },
        y:{ beginAtZero:true, grid:{color:'#EDEAE5'}, ticks:{stepSize:1,font:{size:10}} }
      }
    }
  });

  // 3 — Dept stacked bar
  chartInstances.dept = new Chart(document.getElementById('chart-dept'), {
    type: 'bar',
    data: {
      labels: DEPT_NAMES,
      datasets: [
        { label:'Green',  data: DEPT_NAMES.map(d=>dsc[d].Green), backgroundColor:'#22c55e' },
        { label:'Blue',   data: DEPT_NAMES.map(d=>dsc[d].Blue),  backgroundColor:'#B9D2DC' },
        { label:'Black',  data: DEPT_NAMES.map(d=>dsc[d].Black), backgroundColor:'#1D252C' },
        { label:'N/A',    data: DEPT_NAMES.map(d=>dsc[d].NA),    backgroundColor:'#DDE3E7' },
      ]
    },
    options: {
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{ position:'bottom', labels:{boxWidth:11,padding:10,font:{size:11}} } },
      scales:{
        x:{ stacked:true, grid:{display:false}, ticks:{font:{size:10}} },
        y:{ stacked:true, grid:{color:'#EDEAE5'}, ticks:{font:{size:10}} }
      }
    }
  });
}

function destroyCharts() {
  for (const k of Object.keys(chartInstances)) { chartInstances[k].destroy(); delete chartInstances[k]; }
}

/* ═══════════════════════════════════════════════════
   LIST VIEW
═══════════════════════════════════════════════════ */
function renderList() {
  const el = document.getElementById('list-view');
  if (!filteredEvents.length) { el.innerHTML = emptyState('No events match your filters','Adjust the filters or clear your search.'); return; }
  const groups = {};
  for (const ev of filteredEvents) {
    const k = fmtDateKey(ev.date);
    if (!groups[k]) groups[k]={date:ev.date,events:[]};
    groups[k].events.push(ev);
  }
  const todayKey = fmtDateKey(new Date());
  let html = '';
  for (const k of Object.keys(groups).sort()) {
    const {date,events} = groups[k];
    const isTd = k===todayKey;
    html += `
      <div>
        <div class="day-hdr">
          <div class="day-badge${isTd?' is-today':''}">${date.toLocaleDateString('en-US',{month:'short',day:'numeric'})}</div>
          <div class="day-name">${date.toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}${isTd?'<span class="today-chip">Today</span>':''}</div>
          <div class="day-line"></div>
        </div>
        <div class="events-grid">${events.map(evCard).join('')}</div>
      </div>`;
  }
  el.innerHTML = html;
}

function evCard(ev) {
  const color = catColor(ev.category);
  const timeStr = ev.allDay ? 'All Day'
    : (ev.startTime?fmtTime(ev.startTime):'') + (ev.endTime?' – '+fmtTime(ev.endTime):'');
  const nonNA = Object.entries(ev.depts).filter(([,s])=>s!=='N/A');
  const badges = nonNA.map(([dept,status]) => {
    const bg={Green:'#f0fdf4',Blue:'#EBF4FA',Black:'#1D252C'}[status]||'#F2F0EC';
    const fg={Green:'#15803d',Blue:'#1558A0',Black:'white'}[status]||'#5A6872';
    return `<span class="d-badge" style="background:${bg};color:${fg};"><span class="dn">${dept}:</span> ${status}</span>`;
  }).join('');
  return `
    <div class="event-card" style="--cat-color:${color}" onclick="openEvent(${ev.id})">
      <div class="ev-top">
        <div class="ev-title">${esc(ev.subject)}</div>
        <span class="cat-tag" style="background:${color}">${esc(ev.category)}</span>
      </div>
      ${(timeStr||ev.location)?`
      <div class="ev-meta">
        ${timeStr?`<div class="meta-row">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          ${esc(timeStr)}</div>`:''}
        ${ev.location?`<div class="meta-row">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
          ${esc(ev.location)}</div>`:''}
      </div>`:'' }
      ${badges?`<div class="dept-badges">${badges}</div>`:''}
    </div>`;
}

/* ═══════════════════════════════════════════════════
   CALENDAR VIEW
═══════════════════════════════════════════════════ */
function renderCalendar() {
  const el = document.getElementById('calendar-view');
  const year=calendarDate.getFullYear(), mo=calendarDate.getMonth();
  const todayKey = fmtDateKey(new Date());
  const evMap={};
  for (const ev of filteredEvents) {
    const k=fmtDateKey(ev.date); if(!evMap[k]) evMap[k]=[]; evMap[k].push(ev);
  }
  const firstDay=new Date(year,mo,1), lastDay=new Date(year,mo+1,0);
  const offset=firstDay.getDay();
  let html=`
    <div class="cal-nav">
      <button class="cal-btn" onclick="calNav(-1)">&#8592;</button>
      <div style="display:flex;align-items:center;gap:10px;">
        <h2>${MONTHS[mo]} ${year}</h2>
        <button class="today-btn" onclick="calToday()">Today</button>
      </div>
      <button class="cal-btn" onclick="calNav(1)">&#8594;</button>
    </div>
    <div class="cal-wrap">
      <div class="cal-wkdays">${WEEKDAYS.map(d=>`<div class="cal-wkday">${d}</div>`).join('')}</div>
      <div class="cal-days">`;
  for (let i=0;i<offset;i++) {
    const pd=new Date(year,mo,-offset+i+1);
    html+=`<div class="cal-day other-mo"><div class="cal-day-num">${pd.getDate()}</div></div>`;
  }
  for (let d=1;d<=lastDay.getDate();d++) {
    const date=new Date(year,mo,d), key=fmtDateKey(date), isTd=key===todayKey;
    const evs=evMap[key]||[], max=3;
    const pills=evs.slice(0,max).map(ev=>
      `<div class="cal-pill" style="background:${catColor(ev.category)}" onclick="event.stopPropagation();openEvent(${ev.id})" title="${esc(ev.subject)}">${esc(ev.subject)}</div>`
    ).join('');
    const more=evs.length>max?`<div class="cal-more">+${evs.length-max} more</div>`:'';
    html+=`<div class="cal-day${isTd?' is-today':''}" onclick="openDay('${key}',${d})">
      <div class="cal-day-num">${d}</div>
      <div class="cal-evs">${pills}${more}</div>
    </div>`;
  }
  const trailing=(7-(offset+lastDay.getDate())%7)%7;
  for (let i=1;i<=trailing;i++) html+=`<div class="cal-day other-mo"><div class="cal-day-num">${i}</div></div>`;
  html+='</div></div>';
  el.innerHTML=html;
}
function calNav(dir) { calendarDate=new Date(calendarDate.getFullYear(),calendarDate.getMonth()+dir,1); renderCalendar(); }
function calToday()   { calendarDate=new Date(); renderCalendar(); }

/* ═══════════════════════════════════════════════════
   DAY MODAL — events grouped by category
═══════════════════════════════════════════════════ */
function openDay(dateKey, dayNum) {
  const date = new Date(calendarDate.getFullYear(), calendarDate.getMonth(), dayNum);
  const dayEvs = filteredEvents.filter(ev => fmtDateKey(ev.date)===dateKey);
  if (!dayEvs.length) return;

  document.getElementById('day-modal-title').textContent = fmtDateFull(date);

  // Sort: all-day first, then by time
  dayEvs.sort((a,b) => {
    if (a.allDay && !b.allDay) return -1;
    if (!a.allDay && b.allDay) return 1;
    return (a.startTime||'').localeCompare(b.startTime||'');
  });

  // Group by category, preserving first-appearance order
  const groups={}, order=[];
  for (const ev of dayEvs) {
    if (!groups[ev.category]) { groups[ev.category]=[]; order.push(ev.category); }
    groups[ev.category].push(ev);
  }

  let html = '';
  for (const cat of order) {
    const color = catColor(cat);
    const evs   = groups[cat];
    html += `
      <div class="day-cat-section">
        <div class="day-cat-hdr" style="--cat-color:${color}">
          <span class="day-cat-pip" style="--cat-color:${color}"></span>
          ${esc(cat)}
          <span class="day-cat-count">(${evs.length})</span>
        </div>
        <div class="day-ev-list">
          ${evs.map(ev=>`
            <div class="day-ev-item" style="--cat-color:${color}" onclick="closeDayModalBtn();openEvent(${ev.id})">
              <div class="day-ev-time">${ev.allDay?'All Day':(ev.startTime?esc(fmtTime(ev.startTime)):'')}</div>
              <div>
                <div class="day-ev-name">${esc(ev.subject)}</div>
                ${ev.location?`<div class="day-ev-loc">${esc(ev.location)}</div>`:''}
              </div>
            </div>`).join('')}
        </div>
      </div>`;
  }

  document.getElementById('day-modal-body').innerHTML = html;
  document.getElementById('day-modal-overlay').classList.add('open');
}

/* ═══════════════════════════════════════════════════
   EVENT DETAIL MODAL
═══════════════════════════════════════════════════ */
function openEvent(id) {
  const ev = allEvents.find(e=>e.id===id); if (!ev) return;
  const color = catColor(ev.category);
  document.getElementById('modal').style.setProperty('--cat-color', color);
  document.getElementById('modal-cat-tag').innerHTML =
    `<span class="cat-tag" style="background:${color}">${esc(ev.category)}</span>`;
  document.getElementById('modal-title').textContent = ev.subject;
  const timeStr = ev.allDay ? 'All Day'
    : (ev.startTime?fmtTime(ev.startTime):'') + (ev.endTime?' – '+fmtTime(ev.endTime):'');
  let body = `
    <div>
      <div class="ms-title">Date &amp; Time</div>
      <div class="mi-row">
        <svg class="mi-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <div>${esc(fmtDateFull(ev.date))}${timeStr?' &nbsp;·&nbsp; '+esc(timeStr):''}</div>
      </div>
    </div>`;
  if (ev.location) body += `
    <div>
      <div class="ms-title">Location</div>
      <div class="mi-row">
        <svg class="mi-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
        <div>${esc(ev.location)}</div>
      </div>
    </div>`;
  body += `
    <div>
      <div class="ms-title">Department Status</div>
      <div class="dept-grid">
        ${DEPT_NAMES.map(dept => {
          const s = ev.depts[dept]||'N/A', cls = statusCls(s);
          const lbl = {Green:'Normal',Blue:'Enhanced',Black:'High Priority'}[s]||'Not Involved';
          return `<div class="dept-card ${cls}">
            <div class="dept-card-name">${dept}</div>
            <div class="dept-card-status">${s} <span style="font-weight:400;font-size:.72rem;opacity:.6;">— ${lbl}</span></div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  document.getElementById('modal-body').innerHTML = body;
  document.getElementById('modal-overlay').classList.add('open');
}

/* ═══════════════════════════════════════════════════
   MODAL CLOSE HANDLERS
═══════════════════════════════════════════════════ */
function closeModal(e)    { if (e.target===document.getElementById('modal-overlay')) closeModalBtn(); }
function closeModalBtn()  { document.getElementById('modal-overlay').classList.remove('open'); }
function closeDayModal(e) { if (e.target===document.getElementById('day-modal-overlay')) closeDayModalBtn(); }
function closeDayModalBtn(){ document.getElementById('day-modal-overlay').classList.remove('open'); }
document.addEventListener('keydown', e => { if (e.key==='Escape') { closeModalBtn(); closeDayModalBtn(); } });

/* ═══════════════════════════════════════════════════
   EMPTY STATE
═══════════════════════════════════════════════════ */
function emptyState(title, msg) {
  return `<div class="empty-state">
    <svg width="46" height="46" viewBox="0 0 24 24" fill="none" stroke="#48565A" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    <h3>${title}</h3><p>${msg}</p></div>`;
}
